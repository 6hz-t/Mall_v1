  #配置数据源
  shardingsphere:
    datasource:
      names: ds0,ds1
      ds0:
        type: com.alibaba.druid.pool.DruidDataSource
        driver-class-name: com.mysql.cj.jdbc.Driver
        url: jdbc:mysql://localhost:3306/susan_mall_order_0?serverTimezone=Asia/Shanghai&characterEncoding=utf8&useSSL=false&zeroDateTimeBehavior=convertToNull&allowMultiQueries=true
        username: root
        password: 123456
      ds1:
        type: com.alibaba.druid.pool.DruidDataSource
        driver-class-name: com.mysql.cj.jdbc.Driver
        url: jdbc:mysql://localhost:3306/susan_mall_order_1?serverTimezone=Asia/Shanghai&characterEncoding=utf8&useSSL=false&zeroDateTimeBehavior=convertToNull&allowMultiQueries=true
        username: root
        password: 123456
    sharding:
      tables:
        #逻辑表名称
        order_trade:
          #配置在那个数据库，那个表
          actual-data-nodes: ds${0..1}.order_trade_${0..1}
          database-strategy:
            standard: #这个地方不可忽略
              sharding-column: code
              precise-algorithm-class-name: cn.net.susan.sharding.OrderDataBasePreciseShardingAlgorithm
          table-strategy:
            standard:
              shardingColumn: code
              preciseAlgorithmClassName: cn.net.susan.sharding.OrderTablePreciseShardingAlgorithm
        order_trade_item:
          #配置在那个数据库，那个表
          actual-data-nodes: ds${0..1}.order_trade_item_${0..1}
          database-strategy:
            standard: #这个地方不可忽略
              sharding-column: code
              precise-algorithm-class-name: cn.net.susan.sharding.OrderDataBasePreciseShardingAlgorithm
          table-strategy:
            standard:
              shardingColumn: code
              preciseAlgorithmClassName: cn.net.susan.sharding.OrderTablePreciseShardingAlgorithm
        order_trade_delivery_address:
          #配置在那个数据库，那个表
          actual-data-nodes: ds${0..1}.order_trade_delivery_address_${0..1}
          database-strategy:
            standard: #这个地方不可忽略
              sharding-column: code
              precise-algorithm-class-name: cn.net.susan.sharding.OrderDataBasePreciseShardingAlgorithm
          table-strategy:
            standard:
              shardingColumn: code
              preciseAlgorithmClassName: cn.net.susan.sharding.OrderTablePreciseShardingAlgorithm
    #日志显示具体的SQL
    props:
      sql:
        show: true
